<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ตารางออกกำลังกาย · Dumbbell 10kg×2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0c12;
    color: #f0f0f0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
  }
  /* Header */
  #header {
    position: sticky; top: 0; z-index: 10;
    padding: 18px 18px 12px;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #ffffff22;
    transition: background 0.4s, border-color 0.4s;
  }
  #header-inner { max-width: 560px; margin: 0 auto; }
  #header-sub { font-size: 10px; letter-spacing: 4px; font-weight: 700; margin-bottom: 4px; transition: color 0.3s; }
  #header-title { font-size: 20px; font-weight: 900; color: #fff; }
  #header-title span { transition: color 0.3s; }
  #header-duration { font-size: 12px; color: #555; margin-top: 3px; }

  /* Day tabs */
  #tabs-wrap { overflow-x: auto; padding: 12px 18px 0; }
  #tabs { display: flex; gap: 6px; max-width: 560px; margin: 0 auto; }
  .tab-btn {
    flex: 0 0 auto; padding: 7px 13px; border-radius: 10px;
    border: 2px solid #ffffff12; background: transparent;
    color: #555; font-weight: 700; font-size: 11px;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .tab-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }

  /* Main content */
  #main { max-width: 560px; margin: 0 auto; padding: 16px 18px 50px; }

  /* Warmup/Cooldown */
  .info-box {
    padding: 12px 14px; border-radius: 12px; margin-bottom: 14px;
    font-size: 13px; color: #aaa; line-height: 1.6;
    border: 1px solid;
  }
  .info-box-label { font-size: 11px; letter-spacing: 2px; font-weight: 700; margin-bottom: 4px; }
  .warmup-box { background: #0e1f1a; border-color: #00C9A733; }
  .warmup-box .info-box-label { color: #00C9A7; }
  .cooldown-box { background: #101828; border-color: #64B5F633; }
  .cooldown-box .info-box-label { color: #64B5F6; }

  /* Section label */
  .section-label { font-size: 11px; letter-spacing: 2px; color: #444; font-weight: 700; margin-bottom: 10px; }

  /* Exercise card */
  .ex-card {
    background: #111118; border-radius: 16px;
    border: 1px solid #ffffff0d; overflow: hidden;
    margin-bottom: 10px; transition: border-color 0.2s;
  }
  .ex-card.open { border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

  .ex-header {
    display: flex; align-items: center; padding: 14px 16px;
    cursor: pointer; gap: 12px; user-select: none;
  }
  .ex-num {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px; flex-shrink: 0;
    transition: all 0.3s;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
  }
  .ex-num.done { background: var(--accent); color: #000; }
  .ex-info { flex: 1; }
  .ex-name { font-weight: 700; font-size: 14px; color: #f0f0f0; transition: color 0.2s; }
  .ex-name.done { color: #555; }
  .ex-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .ex-meta { text-align: right; flex-shrink: 0; }
  .ex-sets-count { font-size: 12px; font-weight: 700; color: var(--accent); }
  .ex-reps { font-size: 11px; color: #555; }
  .ex-arrow { color: #333; font-size: 14px; margin-left: 4px; }

  /* Progress bar */
  .ex-progress { height: 3px; background: #ffffff08; }
  .ex-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  /* Expanded body */
  .ex-body { padding: 14px 16px; border-top: 1px solid #ffffff08; display: none; }
  .ex-body.open { display: block; }

  .sets-label { font-size: 11px; color: #555; letter-spacing: 2px; margin-bottom: 8px; }
  .sets-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .set-dot {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; transition: all 0.2s;
    border: 1px solid #ffffff15; background: #1e1e2e; color: #555;
    cursor: default;
  }
  .set-dot.done { background: var(--accent); border-color: var(--accent); color: #000; }

  .rest-badge {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding: 8px 12px; border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .rest-badge-icon { font-size: 16px; }
  .rest-badge-time { font-size: 12px; font-weight: 700; color: var(--accent); }
  .rest-badge-min { font-size: 11px; color: #666; margin-left: 6px; }

  .tip-box {
    padding: 10px 12px; background: #1a1a24; border-radius: 10px;
    margin-bottom: 10px; font-size: 12px; color: #bbb; line-height: 1.7;
  }
  .warn-box {
    padding: 8px 12px; background: #2a1a1a; border-radius: 10px;
    margin-bottom: 14px; font-size: 12px; color: #e88; line-height: 1.6;
  }
  .log-btn {
    width: 100%; padding: 12px; border-radius: 12px;
    background: var(--accent); color: #000;
    border: none; font-weight: 800; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .log-btn:disabled { background: #1e1e2e; color: #444; cursor: default; }

  /* Rest legend */
  .legend-box {
    padding: 14px 16px; background: #111118;
    border: 1px solid #ffffff08; border-radius: 12px; margin-top: 6px;
  }
  .legend-label { font-size: 11px; letter-spacing: 2px; color: #444; font-weight: 700; margin-bottom: 10px; }
  .legend-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-text { font-size: 12px; color: #777; }
  .legend-val { font-size: 12px; font-weight: 700; }

  /* Rest timer overlay */
  #timer-overlay {
    position: fixed; inset: 0; background: #000000cc;
    display: none; align-items: center; justify-content: center; z-index: 999;
  }
  #timer-overlay.show { display: flex; }
  #timer-box {
    background: #1a1a2e; border: 2px solid #ffffff22; border-radius: 24px;
    padding: 40px 50px; text-align: center; min-width: 260px;
  }
  #timer-label { font-size: 13px; letter-spacing: 3px; color: #888; margin-bottom: 16px; }
  #timer-count { font-size: 64px; font-weight: 900; color: #fff; line-height: 1; transition: color 0.3s; }
  #timer-count.urgent { color: #FF6B35; }
  #timer-unit { font-size: 14px; color: #666; margin-bottom: 20px; }
  #timer-bar-bg { height: 6px; background: #ffffff15; border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
  #timer-bar-fill { height: 100%; background: #00C9A7; border-radius: 99px; transition: width 1s linear, background 0.3s; }
  #timer-skip {
    background: #ffffff15; border: 1px solid #ffffff22; color: #aaa;
    padding: 8px 20px; border-radius: 10px; cursor: pointer; font-size: 13px;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="header-inner">
    <div id="header-sub">DUMBBELL PROGRAM · 10KG×2 · 52KG · 167CM</div>
    <div id="header-title">

    <div id="header-duration"></div>

</div>

<!-- Tabs -->
<div id="tabs-wrap">

</div>

<!-- Main -->
<div id="main"></div>

<!-- Rest Timer -->
<div id="timer-overlay">

    <div id="timer-count">90</div>

    <div id="timer-bar-bg"><div id="timer-bar-fill"></div></div>
    <button id="timer-skip" onclick="stopTimer()">ข้ามการพัก</button>
  </div>
</div>

    label:"SAT", day:"เสาร์", focus:"Full Body + เผาผลาญ", emoji:"⚡",
    accent:"#C77DFF", duration:"~50 นาที",
    warmup:"Jumping Jack 30 วิ + วิ่งอยู่กับที่ 30 วิ × 2 รอบ",
    cooldown:"เดินเบาๆ 5 นาที + ยืดทุกส่วนครั้งละ 30 วิ",
    exercises:[
      {name:"Dumbbell Thruster",thai:"สควอท+กดพร้อมกัน",muscle:"ขา + ไหล่ + ทั่วตัว",sets:4,reps:"12",rest:90,tip:"ถือดัมเบลระดับไหล่ ย่อสควอท แล้วลุกพร้อมกดดัมเบลขึ้นเหนือหัว ทำให้ต่อเนื่องเป็นท่าเดียว",warning:"ท่า Compound เผาผลาญสูงมาก พักให้เพียงพอ"},
      {name:"Dumbbell Swing",thai:"สวิงดัมเบล",muscle:"สะโพก + หลัง + หัวใจ",sets:3,reps:"15",rest:75,tip:"จับดัมเบลแนวตั้งสองมือ ยืนขาถ่าง สวิงจากระหว่างขาขึ้นระดับไหล่โดยใช้สะโพกส่งแรง",warning:"พลังมาจากสะโพก ไม่ใช่แขน"},
      {name:"Man Maker",thai:"ท่ารวมสุดโหด",muscle:"ทั่วตัว",sets:3,reps:"6–8",rest:90,tip:"ท่าวิดพื้น → Row ซ้าย → Row ขวา → กระโดดเท้าเข้า → Thruster = 1 ครั้ง ทำช้าๆ",warning:"ท่ายากมาก ถ้าเหนื่อยเกินให้ตัดบางส่วนออก"},
      {name:"Dumbbell Deadlift",thai:"ยกน้ำหนักท่าตาย",muscle:"หลัง + ขา + สะโพก",sets:3,reps:"12",rest:90,tip:"ถือดัมเบลสองมือ ยืนขาห่างสะโพก ก้มสะโพกถอยหลัง ลำตัวตรง ยกขึ้นโดยดันพื้น",warning:"หลังตรงเสมอ อย่าหลังโค้ง"},
    ]
  },
  {
    label:"SUN", day:"อาทิตย์", focus:"พักผ่อนเต็มที่", emoji:"😴",
    accent:"#90A4AE", duration:"พัก",
    warmup:"–", cooldown:"–",
    exercises:[
      {name:"นอนหลับ 7–9 ชั่วโมง",thai:"Recovery สำคัญที่สุด",muscle:"ทุกส่วน",sets:1,reps:"ทั้งคืน",rest:0,tip:"กล้ามเนื้อโตและซ่อมแซมระหว่างนอนหลับ ไม่ใช่ตอนออกกำลังกาย นอนก่อนเที่ยงคืน",warning:"อย่าออกกำลังกายหนักวันนี้เด็ดขาด"},
      {name:"โฟมโรล + นวดตัวเอง",thai:"Self Myofascial Release",muscle:"กล้ามเนื้อทุกส่วน",sets:1,reps:"15–20 นาที",rest:0,tip:"ค่อยๆ กลิ้งโฟมโรลบนกล้ามเนื้อที่ตึง หยุดค้างตรงจุดที่เจ็บ 30 วินาที",warning:"ทำเบาๆ ไม่ต้องกดแรง"},
    ]
  },
];

const LEGEND = [
  {label:"กล้ามเนื้อใหญ่ (อก หลัง ขา)", time:"90 วินาที", color:"#FF6B35"},
  {label:"กล้ามเนื้อกลาง (ไหล่ Compound)", time:"75–90 วินาที", color:"#FFD93D"},
  {label:"กล้ามเนื้อเล็ก (Bicep Tricep)", time:"60–75 วินาที", color:"#00C9A7"},
  {label:"Core / น่อง", time:"45–60 วินาที", color:"#C77DFF"},
];

let currentDay = 0;
let setsDone = {}; // key: dayIdx-exIdx
let timerInterval = null;
let timerTotal = 0;
let timerLeft = 0;

function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentDay ? ' active' : '');
    btn.style.setProperty('--accent', d.accent);
    btn.textContent = d.label;
    btn.onclick = () => { currentDay = i; render(); };
    tabs.appendChild(btn);
  });
}

function getSetsDone(di, ei) {
  return setsDone[`${di}-${ei}`] || 0;
}
function incSetsDone(di, ei, total) {
  const key = `${di}-${ei}`;
  const cur = setsDone[key] || 0;
  if (cur < total) setsDone[key] = cur + 1;
}

function render() {
  buildTabs();
  const d = DAYS[currentDay];
  document.documentElement.style.setProperty('--accent', d.accent);

  // Header
  const hdr = document.getElementById('header');
  hdr.style.background = `linear-gradient(160deg, ${hex2rgba(d.accent, 0.1)} 0%, #0c0c12 55%)`;
  hdr.style.borderBottomColor = hex2rgba(d.accent, 0.3);
  document.getElementById('header-sub').style.color = d.accent;
  document.getElementById('header-emoji').textContent = d.emoji + ' ';
  document.getElementById('header-day').textContent = d.day;
  const hf = document.getElementById('header-focus');
  hf.textContent = d.focus;
  hf.style.color = d.accent;
  document.getElementById('header-duration').textContent = '⏳ ' + d.duration;

  // Main
  const main = document.getElementById('main');
  let html = '';

  if (d.warmup && d.warmup !== '–') {
    html += `<div class="info-box warmup-box"><div class="info-box-label">🔥 WARM UP</div>${d.warmup}</div>`;
  }

  html += `<div class="section-label">EXERCISES — กดที่ท่าเพื่อดูรายละเอียด + บันทึกเซต</div>`;

  d.exercises.forEach((ex, ei) => {
    const done = getSetsDone(currentDay, ei);
    const total = ex.sets;
    const prog = total > 1 ? (done / total * 100) : 0;
    const isDone = done >= total;
    const isOpen = document.querySelector(`.ex-card[data-ei="${ei}"]`)?.classList.contains('open') || false;

    html += `<div class="ex-card${isOpen?' open':''}" data-ei="${ei}" style="--accent:${d.accent}">`;
    html += `<div class="ex-header" onclick="toggleCard(${ei})">`;
    html += `<div class="ex-num${isDone?' done':''}">`;
    html += isDone ? '✓' : (ei+1);
    html += `</div>`;
    html += `<div class="ex-info">`;
    html += `<div class="ex-name${isDone?' done':''}">${ex.name}</div>`;
    html += `<div class="ex-sub">${ex.thai} · ${ex.muscle}</div>`;
    html += `</div>`;
    html += `<div class="ex-meta">`;
    html += `<div class="ex-sets-count">${done}/${total} เซต</div>`;
    html += `<div class="ex-reps">${ex.reps} ครั้ง</div>`;
    html += `</div>`;
    html += `<div class="ex-arrow">${isOpen?'▲':'▼'}</div>`;
    html += `</div>`;

    html += `<div class="ex-progress"><div class="ex-progress-fill" style="width:${prog}%"></div></div>`;

    html += `<div class="ex-body${isOpen?' open':''}">`;
    // Sets dots
    html += `<div class="sets-label">เซตที่ทำแล้ว</div><div class="sets-grid">`;
    for (let s = 0; s < total; s++) {
      html += `<div class="set-dot${s < done ? ' done':''}">${s < done ? '✓' : s+1}</div>`;
    }
    html += `</div>`;

    if (ex.rest > 0) {
      html += `<div class="rest-badge"><span class="rest-badge-icon">⏱️</span>`;
      html += `<span class="rest-badge-time">พัก ${ex.rest} วินาที</span>`;
      html += `<span class="rest-badge-min">(${(ex.rest/60).toFixed(1)} นาที)</span></div>`;
    }

    html += `<div class="tip-box">💡 <strong style="color:#fff">เทคนิค:</strong> ${ex.tip}</div>`;
    html += `<div class="warn-box">⚠️ ${ex.warning}</div>`;
    html += `<button class="log-btn" onclick="logSet(${ei})" ${isDone?'disabled':''}>`;
    html += isDone ? '✓ ครบแล้ว!' : `บันทึกเซตที่ ${done + 1}`;
    html += `</button>`;
    html += `</div></div>`;
  });

  if (d.cooldown && d.cooldown !== '–') {
    html += `<div class="info-box cooldown-box" style="margin-top:14px"><div class="info-box-label">❄️ COOL DOWN</div>${d.cooldown}</div>`;
  }

  // Legend
  html += `<div class="legend-box"><div class="legend-label">⏱️ สรุปเวลาพักระหว่างเซต</div>`;
  LEGEND.forEach(r => {
    html += `<div class="legend-row"><span class="legend-text">${r.label}</span><span class="legend-val" style="color:${r.color}">${r.time}</span></div>`;
  });
  html += `</div>`;

  main.innerHTML = html;
}

function toggleCard(ei) {
  const card = document.querySelector(`.ex-card[data-ei="${ei}"]`);
  const body = card.querySelector('.ex-body');
  const arrow = card.querySelector('.ex-arrow');
  card.classList.toggle('open');
  body.classList.toggle('open');
  arrow.textContent = card.classList.contains('open') ? '▲' : '▼';
}

function logSet(ei) {
  const d = DAYS[currentDay];
  const ex = d.exercises[ei];
  const before = getSetsDone(currentDay, ei);
  incSetsDone(currentDay, ei, ex.sets);
  const after = getSetsDone(currentDay, ei);
  render();
  // Re-open card
  const card = document.querySelector(`.ex-card[data-ei="${ei}"]`);
  if (card) {
    card.classList.add('open');
    card.querySelector('.ex-body').classList.add('open');
    card.querySelector('.ex-arrow').textContent = '▲';
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
  // Start timer if not last set
  if (after < ex.sets && ex.rest > 0) {
    startTimer(ex.rest);
  }
}

function startTimer(secs) {
  stopTimer();
  timerTotal = secs;
  timerLeft = secs;
  document.getElementById('timer-overlay').classList.add('show');
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerLeft--;
    if (timerLeft <= 0) { stopTimer(); return; }
    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const count = document.getElementById('timer-count');
  const fill = document.getElementById('timer-bar-fill');
  count.textContent = timerLeft;
  count.className = timerLeft <= 10 ? 'urgent' : '';
  const pct = (timerLeft / timerTotal * 100);
  fill.style.width = pct + '%';
  fill.style.background = timerLeft <= 10 ? '#FF6B35' : '#00C9A7';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-overlay').classList.remove('show');
}

// Init
render();
</script>
</body>
</html>
